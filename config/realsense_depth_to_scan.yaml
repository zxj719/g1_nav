realsense_camera:
  launch_arguments:
    camera_name: camera
    camera_namespace: camera
    serial_no: ""
    config_file: ""
    log_level: info
    output: screen
    enable_color: true
    enable_depth: true
    "align_depth.enable": false
    "pointcloud.enable": false
    publish_tf: true
    tf_publish_rate: 0.0

depth_to_scan:
  remappings:
    depth: /camera/camera/depth/image_rect_raw
    depth_camera_info: /camera/camera/depth/camera_info
    scan: /scan
  parameters:
    # Publish scans directly in the robot base frame so downstream consumers
    # do not need a second timestamp-sensitive camera_depth_frame -> base lookup.
    output_frame: base
    # Match the observed ~10 Hz depth update rate to reduce stale-source warnings.
    scan_time: 0.1
    range_min: 0.2
    range_max: 2.5
    scan_height: 3
