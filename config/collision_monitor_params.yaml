collision_monitor:
  ros__parameters:
    base_frame_id: "base"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel"
    cmd_vel_out_topic: "cmd_vel_safe"
    transform_tolerance: 0.3
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 0.3

    # Use footprint-based time-to-collision gating so in-place turning for
    # behind-goal recovery is not blocked by a fixed forward stop zone.
    polygons: ["Approach"]
    Approach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.0
      simulation_time_step: 0.1
      max_points: 6
      visualize: True
      polygon_pub_topic: "collision_monitor/approach_polygon"
      enabled: True

    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      enabled: True
