# =============================================================================
# Frontier Explorer Parameters
# =============================================================================
# BFS frontier-based autonomous explorer inspired by m-explore.
# Searches outward from robot position and selects the nearest frontier.
# The final navigation target is snapped onto the nearest free cell around
# the frontier before sending NavigateToPose.
#
# Control:  publish Bool to 'explore/resume' to stop (false) / resume (true)
# =============================================================================

frontier_explorer:
  ros__parameters:
    # How often the planner runs (Hz).
    # The node also replans immediately on goal completion, so this mainly
    # controls how quickly it reacts when idle.
    planner_frequency: 0.2

    # TF frames
    robot_base_frame: base
    odom_frame: odom
    odom_topic: /lightning/odometry
    global_frame: map
    map_topic: /lightning/grid_map
    live_map_ready_topic: /map_live_ready
    require_live_map: true

    # TF lookup tolerance (seconds)
    transform_tolerance: 2.0

    # Minimum number of frontier cells in a cluster to be considered
    # a valid frontier. Filters noise / tiny gaps.
    min_frontier_size: 35

    # Only refresh frontier candidates that are near the robot. This keeps
    # frontier updates local while a locked frontier target stays unchanged.
    # Set <= 0 to disable the distance gate.
    frontier_update_radius: 0.0

    # If no movement is detected within this many seconds during navigation,
    # cancel the current goal and blacklist that frontier.
    progress_timeout: 30.0

    # Blacklisted frontier expiry time (seconds). After this long the
    # frontier can be targeted again.
    blacklist_timeout: 40.0

    # Radius around a blacklisted point (m). Any frontier centroid
    # within this radius is also considered blacklisted.
    blacklist_radius: 0.5

    # When true, the robot navigates back to its starting pose after
    # all frontiers are exhausted.
    return_to_init: false

    # Publish MarkerArray of snapped frontier navigation targets to /frontier_markers
    visualize: true

    # Search this far around the frontier centroid for the nearest free goal cell.
    direct_frontier_goal_search_radius: 2.0

    # Minimum distance change (m) before a new frontier / navigation goal
    # preempts the current NavigateToPose task.
    goal_update_min_distance: 0.4

    # Weighted frontier evaluation for selecting the next target.
    # Higher score wins:
    # 1) closer to previous frontier target
    # 2) closer to robot
    # 3) more aligned with robot forward direction
    # 4) larger frontier size
    frontier_prev_target_weight: 4.0
    frontier_robot_distance_weight: 2.0
    frontier_forward_alignment_weight: 1.0
    frontier_size_weight: 0.25
